<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. - Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="jarvis-core" id="core">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <div class="core-center"></div>
        </div>

        <div class="status-text" id="status">Sistema em repouso. Diga "Jarvis" para iniciar.</div>

        <div class="chat-container" id="chat"></div>

        <div class="input-area">
            <input type="text" id="textInput" placeholder="Digite seu comando aqui...">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
